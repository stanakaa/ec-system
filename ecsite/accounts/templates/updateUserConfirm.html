{% load static %}
<html>
    <head>
        <meta charset="UTF-8">
        <title>会員情報の更新</title>
        <link rel="stylesheet" type="text/css" href="{% static 'style.css' %}">
    </head>

    <body>
        <h2>以下の会員情報で更新しますか？</h2>

        <form action="{% url 'update_user_commit' %}" method="POST">
            {% csrf_token %}

            <table>
                <tr>
                    <th>会員ID：</th>
                    <td>
                        <input type="text" name="user_id" value="{{ form.user_id.value }}" readonly>
                    </td>
                </tr>

                <tr>
                    <th>パスワード：</th>
                    <td>
                        <input type="password" value="{{ password_display }}" readonly>

                        <input type="hidden" name="password" value="{{ form.password.value }}">
                        <input type="hidden" name="password2" value="{{ form.password2.value }}">
                    </td>
                </tr>

                <tr>
                    <th>お名前：</th>
                    <td>
                        <input type="text" name="name" value="{{ form.name.value }}" readonly>
                    </td>
                </tr>

                <tr>
                    <th>ご住所：</th>
                    <td>
                        <input type="text" name="address" value="{{ form.address.value }}" readonly>
                    </td>
                </tr>

                <tr>
                    <td colspan="2">
                        <input type="submit" value="変更">
                    </td>
                </tr>
            </table>
        </form>

        <p>
            <a href="{% url 'top' %}">商品検索へ</a>
        </p>
    </body>
</html>
