{% load static %}
<html>
    <head>
        <meta charset="UTF-8">
        <title>会員情報の確認</title>
        <link rel="stylesheet" type="text/css" href="{% static 'style.css' %}">
    </head>

    <body>
        <h2>会員情報</h2>

        <br>

        <table border="1">
            <tr>
                <th>会員ID</th>
                <td>{{ user.user_id }}</td>
            </tr>

            <tr>
                <th>パスワード</th>
                <td>表示なし</td>
            </tr>

            <tr>
                <th>お名前</th>
                <td>{{ user.name }}</td>
            </tr>

            <tr>
                <th>ご住所</th>
                <td>{{ user.address }}</td>
            </tr>
        </table>
        <br>
        <p>
            <a href="{% url 'update_user' %}">会員情報の変更</a>
            <br>
            <a href="{% url 'top' %}">商品検索へ</a>
        </p>
    </body>
</html>
