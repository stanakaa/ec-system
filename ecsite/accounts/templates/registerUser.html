{% load static %}
<html>
	<head>
		<meta http-equiv='Content-Type' content='text/html; charset=UTF-8' />
		<title>会員登録</title>
		<link rel='stylesheet' type='text/css' href='{% static "style.css" %}' />
	</head>
	<body>
		<h2>会員情報を入力してください。</h2>
        <form action="{% url 'register_user_confirm' %}" method="POST">
            {% csrf_token %}

            {% if error %}
                <p>{{ error }}</p>
            {% endif %}
        
            <table>
                {% for field in form %}
                <tr>
                    <th>{{ field.label }}：</th>
                    <td>{{ field }}</td>
                </tr>
                {% endfor %}
        
                <tr>
                    <td colspan="2">
                        <input type="submit" value="登録確認" />
                    </td>
                </tr>
            </table>
        </form>
        
        <p>
            <a href="{% url 'top' %}">商品検索へ</a>
        </p>

	</body>
</html>
